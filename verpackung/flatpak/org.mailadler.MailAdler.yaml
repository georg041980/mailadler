app-id: org.mailadler.MailAdler
runtime: org.kde.Platform
runtime-version: '6.4'
sdk: org.kde.Sdk
command: mailadler
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=home
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
modules:
  - name: mailadler
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..

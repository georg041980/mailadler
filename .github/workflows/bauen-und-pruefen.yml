name: Bauen und Prüfen

on:
  push:
    branches: [hauptzweig]
  pull_request:
    branches: [hauptzweig]

jobs:
  bauen-und-pruefen:
    runs-on: ubuntu-24.04

    steps:
      - name: Quelltext auschecken
        uses: actions/checkout@v4

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ninja-build \
            clang-format \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libgl1-mesa-dev

      - name: Formatierung prüfen
        run: |
          clang-format --version
          clang-format --dry-run --Werror $(find quelltext pruefungen -name '*.h' -o -name '*.cpp')

      - name: Projekt einrichten (mit Sanitizern)
        run: cmake -B bau -GNinja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON -DSICHERER_BAU=ON

      - name: Bauen
        run: cmake --build bau --parallel $(nproc)

      - name: Prüfungen ausführen
        run: ctest --test-dir bau --output-on-failure

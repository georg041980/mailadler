name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Qt 6.10.0 installieren
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtbase qttools'

      - name: Übersetzungen kompilieren (.qm erzeugen)
        run: |
          cd $GITHUB_WORKSPACE
          $QT_BIN_DIR/lrelease mailadler_de_DE.ts mailadler_en_US.ts mailadler_es_ES.ts

      - name: Build vorbereiten (qmake)
        run: |
          cd $GITHUB_WORKSPACE
          $QT_BIN_DIR/qmake mailadler.pro

      - name: Projekt bauen (make)
        run: |
          cd $GITHUB_WORKSPACE
          make -j$(nproc)

      - name: Tests bauen
        run: |
          cd $GITHUB_WORKSPACE/tests
          $QT_BIN_DIR/qmake tests.pro
          make -j$(nproc)

      - name: Tests ausführen
        run: ./tests/tst_mailadler
